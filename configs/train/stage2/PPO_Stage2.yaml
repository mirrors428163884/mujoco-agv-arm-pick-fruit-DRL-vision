seed: ${..seed}
algo: PPO

network:
  mlp:
    units: [256, 128]
    # units_track: [512, 256, 128]
    # units_catch: [128, 64]
  separate_value_mlp: True

ppo:
  name: ${resolve_default:Dcmm,${...experiment}}
  normalize_input: True
  normalize_value: True
  value_bootstrap: True
  num_actors: ${resolve_default:8,${...num_envs}}
  reward_scale_value: 0.1
  
  # [UPDATED 2025-01-04] Enable value clipping for large terminal rewards
  # With success/failure gap of +100/-50, value targets have high variance
  clip_value_loss: True
  clip_range_vf: 0.2  # Same as e_clip for value function
  
  normalize_advantage: True
  gamma: 0.99
  tau: 0.95
  
  # [UPDATED 2025-01-04] Separate learning rates for actor/critic
  # Critic uses lower LR due to high variance from terminal rewards
  learning_rate: 3e-4       # Actor learning rate
  critic_lr: 1e-4           # Critic learning rate (lower for stability)
  lr_schedule: kl
  kl_threshold: 0.016
  
  save_best_after: 500
  save_frequency: 2000
  
  # [Modified] Stricter gradient clipping
  grad_norm: 0.5 
  
  # [UPDATED 2025-01-04] Entropy schedule
  # Higher early (exploration) → lower late (exploitation)
  entropy_coef: 0.015       # Slightly higher for early exploration
  entropy_coef_min: 0.005   # Decay to this value
  entropy_decay_steps: 10e6 # Linear decay over 10M steps
  
  freeze_base: False
  freeze_arm: False
  truncate_grads: True
  e_clip: 0.2
  # [Fix 2025-12-19] Adjusted denorm scales:
  # - Base: Not used in Stage 2 (locked to 0)
  # - Arm: 0.025 rad/step delta (about 1.4 deg/step)
  # - Hand: 0.05 rad/step delta (smaller than arm, finer control)
  action_track_denorm: [1.5, 0.025, 0.01]
  action_catch_denorm: [0.0, 0.025, 0.05]
  
  # [Modified] Increase horizon length for long-term dependency (obstacle avoidance)
  horizon_length: 512
  
  # Ensure (num_actors * horizon_length) / minibatch_size is integer
  minibatch_size: 512
  mini_epochs: 6
  
  critic_coef: 4
  clip_value: True
  bounds_loss_coef: 0.0001
  max_agent_steps: 25000000
  test_num_episodes: 100
  max_test_steps: 10000
  # [Fix] Unified to 84x84 to match AVP config and actual CNN architecture
  # Note: DepthCNN in ModelsStage2.py is hardcoded for 84x84 input
  img_dim: [84, 84]
  num_frames: 2
