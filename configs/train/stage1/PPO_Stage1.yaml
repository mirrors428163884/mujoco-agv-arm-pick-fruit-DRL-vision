seed: ${..seed}
algo: PPO

network:
  mlp:
    units: [256, 128]
    # units_track: [512, 256, 128]
    # units_catch: [128, 64]
  separate_value_mlp: True

ppo:
  name: ${resolve_default:Dcmm,${...experiment}}
  normalize_input: True
  normalize_value: True
  value_bootstrap: True
  num_actors: ${resolve_default:8,${...num_envs}}
  # ===== 关键修改1: 奖励缩放 =====
  reward_scale_value: 0.1  # 从0.01改到0.1 ⚠️重要
  clip_value_loss: False
  normalize_advantage: True
  gamma: 0.99
  tau: 0.95
  
  # ===== 关键修改2: 学习率 =====
  lr_schedule: kl           # 改用KL自适应
  kl_threshold: 0.008       # 目标KL
  learning_rate: 3e-4       # 初始学习率
  
  save_best_after: 500
  save_frequency: 2000
  
  # [Modified] Stricter gradient clipping
  grad_norm: 0.5 
  
  # ===== 关键修改3: 熵系数 =====
  entropy_coef: 0.005       # 从0.01降到0.005
  
  freeze_base: False
  freeze_arm: False
  truncate_grads: True
  e_clip: 0.2
  # [FIX 2025-12-19] Increased arm action denorm from 0.025 to 0.05
  # This allows the arm to move faster and reach targets more effectively
  # Original value was too conservative, causing agent to prefer base-only movement
  action_track_denorm: [1.5, 0.05, 0.01]
  action_catch_denorm: [1.5, 0.05, 0.15]
  
  # [Modified] Increase horizon length for long-term dependency (obstacle avoidance)
  horizon_length: 1024
  
  # Ensure (num_actors * horizon_length) / minibatch_size is integer
  minibatch_size: 1024
  mini_epochs: 5
  
  critic_coef: 4
  clip_value: True
  bounds_loss_coef: 0.0001
  max_agent_steps: 25000000
  test_num_episodes: 100
  max_test_steps: 10000
  img_dim: [84, 84]
  num_frames: 2